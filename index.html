<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>相場チェッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f0f0;color:#222}
.hd{background:#e9594c;color:#fff;padding:14px 16px;font-size:18px;font-weight:bold}
.sa{background:#fff;padding:12px;border-bottom:1px solid #ddd}
.sr{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.sr input{flex:1;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:16px;outline:none;min-width:0}
.sr input:focus{border-color:#e9594c}
.btn{padding:12px 18px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;flex-shrink:0}
.bp{background:#e9594c;color:#fff}
.bs{background:#333;color:#fff}
.jd{font-size:12px;color:#888;margin-top:4px;min-height:16px}
.sw{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:200;flex-direction:column}
.sh{background:rgba(0,0,0,.8);color:#fff;padding:16px;text-align:center;font-size:15px}
#interactive{flex:1;overflow:hidden;position:relative;width:100%}
#interactive video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
#interactive canvas{display:none}
.sl{position:absolute;top:50%;left:10%;width:80%;height:3px;background:#e9594c;transform:translateY(-50%);z-index:10}
.sc{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:22px;cursor:pointer;z-index:10}
.ld{display:none;text-align:center;padding:20px;color:#888;font-size:14px}
.rs{padding:12px;display:none}
.cd{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cd h3{font-size:14px;color:#666;margin-bottom:10px}
.lnk{display:block;width:100%;padding:16px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;text-align:center;text-decoration:none;color:#fff}
.lnk2{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;text-align:center;text-decoration:none;color:#fff;margin-top:8px}
.note{font-size:11px;color:#aaa;margin-top:6px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fafafa;border-radius:8px;padding:8px 4px;text-align:center}
.stat-lbl{font-size:10px;color:#999;margin-bottom:3px}
.stat-val{font-size:15px;font-weight:bold;color:#3a3}
.ylist{display:flex;flex-direction:column;gap:6px;margin-top:10px;max-height:280px;overflow-y:auto}
.yitem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px;background:#fafafa;border-radius:8px;text-decoration:none;color:inherit}
.yname{font-size:12px;color:#444;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yprice{font-size:13px;font-weight:bold;color:#3a3;white-space:nowrap}
.yloading{text-align:center;color:#aaa;font-size:13px;padding:16px}
.yempty{text-align:center;color:#bbb;font-size:13px;padding:16px}
</style>
</head>
<body>
<div class="hd">相場チェッカー</div>
<div class="sa">
<div class="sr">
<input type="text" id="kw" placeholder="商品名 または JANコード"/>
<button class="btn bs" onclick="openScan()">Scan</button>
<button class="btn bp" onclick="go()">検索</button>
</div>
<div class="jd" id="jd"></div>
</div>
<div class="sw" id="sw">
<div class="sh">バーコードをカメラに向けてください</div>
<div id="interactive"><div class="sl"></div></div>
<button class="sc" onclick="closeScan()">X</button>
</div>
<div class="ld" id="ld">商品名を取得中...</div>
<div class="rs" id="rs">
<div class="cd">
<h3>ヤフオク 落札相場（直近50件）</h3>
<div class="stats" id="y-stats"></div>
<div id="y-list" class="ylist"></div>
<a id="ya" href="#" target="_blank" class="lnk2" style="background:#3a3">ヤフオクで全件見る</a>
</div>
<div class="cd">
<h3>オークフリー（横断相場）</h3>
<a id="of" href="#" target="_blank" class="lnk" style="background:#6c3">オークフリーで相場を見る</a>
</div>
<div class="cd">
<h3>メルカリ</h3>
<a id="ms" href="#" target="_blank" class="lnk" style="background:#e9594c">売却済みを見る</a>
<a id="mo" href="#" target="_blank" class="lnk2" style="background:#f07030">出品中（安い順）を見る</a>
</div>
<div class="cd">
<h3>Amazon</h3>
<a id="am" href="#" target="_blank" class="lnk" style="background:#f90">Amazonで見る</a>
</div>
</div>
<script>
var GAS='https://script.google.com/macros/s/AKfycbxyIoSzAR8N4RXLIzfejat2UpQxQjbntKJCvm2IvwB799Tj1ZHfQitigh-HsXB3Ug63Vg/exec';
document.getElementById('kw').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
function isJan(s){return /^[0-9]{8,13}$/.test(s);}
function openScan(){
  document.getElementById('sw').style.display='flex';
  Quagga.init({inputStream:{type:'LiveStream',target:document.getElementById('interactive'),constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','upc_reader']},locate:true},function(err){
    if(err){alert('カメラを起動できません');closeScan();return;}Quagga.start();
  });
  Quagga.offDetected();
  Quagga.onDetected(function(d){
    var c=d.codeResult.code;if(!c||c.length<6)return;
    Quagga.offDetected();
    document.getElementById('kw').value=c;
    closeScan();go();
  });
}
function closeScan(){document.getElementById('sw').style.display='none';try{Quagga.stop();}catch(e){}}
function go(){
  var kw=document.getElementById('kw').value.trim();
  if(!kw)return;
  if(isJan(kw)){
    document.getElementById('ld').style.display='block';
    document.getElementById('rs').style.display='none';
    document.getElementById('jd').textContent='JANコード: '+kw+' → 商品名を検索中...';
    fetch(GAS+'?keyword='+encodeURIComponent(kw)+'&type=jan')
      .then(function(r){return r.json();})
      .then(function(j){
        document.getElementById('ld').style.display='none';
        var name=j.name||kw;
        if(j.source!=='none'){
          document.getElementById('kw').value=name;
          document.getElementById('jd').textContent='JAN '+kw+' → '+name;
        } else {
          document.getElementById('jd').textContent='商品名が見つかりませんでした。JANコードで検索します。';
        }
        search(name);
      })
      .catch(function(){
        document.getElementById('ld').style.display='none';
        document.getElementById('jd').textContent='取得失敗。JANコードで検索します。';
        search(kw);
      });
  } else {
    search(kw);
  }
}
function yen(p){return p.toLocaleString()+'円';}
function fmtDate(iso){
  if(!iso)return'';
  var d=new Date(iso);
  if(isNaN(d))return'';
  return (d.getMonth()+1)+'/'+d.getDate();
}
function calcStats(items){
  var prices=items.map(function(i){return i.price;}).filter(function(p){return p>0;}).sort(function(a,b){return a-b;});
  if(!prices.length)return null;
  var sum=prices.reduce(function(s,p){return s+p;},0);
  return{avg:Math.round(sum/prices.length),min:prices[0],max:prices[prices.length-1],count:prices.length};
}
function renderYahooStats(s,fallbackCount){
  var el=document.getElementById('y-stats');
  if(!s){el.innerHTML='<div class="stat" style="grid-column:1/-1">データなし</div>';return;}
  el.innerHTML=
    '<div class="stat"><div class="stat-lbl">平均</div><div class="stat-val">'+yen(s.avg)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">最安</div><div class="stat-val">'+yen(s.min)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">最高</div><div class="stat-val">'+yen(s.max)+'</div></div>';
}
function renderYahooList(items){
  var el=document.getElementById('y-list');
  if(!items.length){el.innerHTML='<div class="yempty">直近の落札データが見つかりませんでした</div>';return;}
  el.innerHTML=items.slice(0,20).map(function(it){
    var url=it.id?'https://page.auctions.yahoo.co.jp/jp/auction/'+it.id:'#';
    var d=fmtDate(it.endTime);
    return '<a class="yitem" href="'+url+'" target="_blank"><span class="yname">'+(it.name||'(商品名不明)')+(d?' ('+d+')':'')+'</span><span class="yprice">'+yen(it.price)+'</span></a>';
  }).join('');
}
function loadYahooData(kw){
  document.getElementById('y-stats').innerHTML='<div class="yloading" style="grid-column:1/-1">相場を取得中...</div>';
  document.getElementById('y-list').innerHTML='';
  fetch(GAS+'?keyword='+encodeURIComponent(kw)+'&type=yahoo_sold')
    .then(function(r){return r.json();})
    .then(function(j){
      var items=j.items||[];
      var stats=calcStats(items);
      if(!stats && j.avgFromMeta){
        stats={avg:j.avgFromMeta,min:0,max:0,count:j.countFromMeta||0};
      }
      renderYahooStats(stats);
      renderYahooList(items);
    })
    .catch(function(){
      document.getElementById('y-stats').innerHTML='<div class="stat" style="grid-column:1/-1">取得失敗</div>';
      document.getElementById('y-list').innerHTML='';
    });
}
function search(kw){
  var e=encodeURIComponent(kw);
  document.getElementById('of').href='https://aucfan.com/search1/q-'+e+'/s-mix/';
  document.getElementById('ms').href='https://jp.mercari.com/search?keyword='+e+'&status=sold_out&sort=created_time&order=desc';
  document.getElementById('mo').href='https://jp.mercari.com/search?keyword='+e+'&status=on_sale&sort=price&order=asc';
  document.getElementById('ya').href='https://auctions.yahoo.co.jp/closedsearch/closedsearch?p='+e+'&va='+e+'&b=1&n=50&s1=end&o1=d';
  document.getElementById('am').href='https://www.amazon.co.jp/s?k='+e;
  document.getElementById('rs').style.display='block';
  document.getElementById('rs').scrollIntoView({behavior:'smooth'});
  loadYahooData(kw);
}
</script>
</body>
</html>
