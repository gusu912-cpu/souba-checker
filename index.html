<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>相場チェッカー</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script><script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"><\/script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f0f0f0;color:#222}.header{background:#e9594c;color:white;padding:14px 16px;position:sticky;top:0;z-index:100}.header h1{font-size:17px;font-weight:bold}.search-area{background:white;padding:12px;border-bottom:1px solid #ddd}.search-row{display:flex;gap:8px;margin-bottom:8px}.search-row input{flex:1;padding:11px 13px;border:2px solid #ddd;border-radius:10px;font-size:16px;outline:none}.search-row input:focus{border-color:#e9594c}.btn{padding:11px 16px;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer}.btn-primary{background:#e9594c;color:white}.btn-scan{background:#333;color:white;font-size:20px;padding:11px 14px}.jan-display{font-size:12px;color:#888;min-height:18px}.scanner-wrap{display:none;position:fixed;inset:0;background:black;z-index:200;flex-direction:column}.scanner-header{background:rgba(0,0,0,.8);color:white;padding:16px;text-align:center}.scanner-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:white;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer}.loading{display:none;text-align:center;padding:40px 20px}.spinner{width:40px;height:40px;border:4px solid #eee;border-top-color:#e9594c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}.results{padding:12px;display:none}.card{background:white;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}.card-title{font-size:14px;font-weight:bold;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}.card-title a{font-size:12px;color:#e9594c;text-decoration:none}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat{background:#fafafa;border-radius:8px;padding:8px 4px;text-align:center}.stat-lbl{font-size:10px;color:#999;margin-bottom:3px}.stat-val{font-size:16px;font-weight:bold;color:#e9594c}.chart-wrap{height:180px;position:relative}.items{display:flex;flex-direction:column;gap:6px;margin-top:10px;max-height:300px;overflow-y:auto}.item{display:flex;align-items:center;gap:8px;padding:7px;background:#fafafa;border-radius:8px;text-decoration:none;color:inherit}.thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;background:#e8e8e8;flex-shrink:0}.item-info{flex:1;min-width:0}.item-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#444}.item-price{font-size:14px;font-weight:bold;color:#e9594c}.item-sub{font-size:11px;color:#bbb}.empty{text-align:center;color:#bbb;padding:20px;font-size:13px}.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:bold;margin-left:6px}.badge-s{background:#e8f5e9;color:#2e7d32}.badge-y{background:#e3f2fd;color:#1565c0}.badge-o{background:#fff8e1;color:#f57f17}</style></head><body><div class="header"><h1>📊 相場チェッカー</h1></div><div class="search-area"><div class="search-row"><input type="text" id="keyword" placeholder="商品名 または JANコード"/><button class="btn btn-scan" onclick="openScanner()">📷</button><button class="btn btn-primary" onclick="search()">検索</button></div><div class="jan-display" id="jan-display"></div></div><div class="scanner-wrap" id="scanner-wrap"><div class="scanner-header">バーコードをカメラに向けてください</div><div id="interactive" style="position:relative;flex:1;overflow:hidden;width:100%;height:100%;"></div><button class="scanner-close" onclick="closeScanner()">✕</button></div><div class="loading" id="loading"><div class="spinner"></div><p style="color:#888;font-size:14px;">データ取得中...</p></div><div class="results" id="results"><div class="card"><div class="card-title"><span>📉 メルカリ 売却済み<span class="badge badge-s">SOLD</span></span><a id="m-sold-link" href="#" target="_blank">見る →</a></div><div class="stats" id="m-sold-stats"></div><div class="chart-wrap"><canvas id="soldChart"></canvas></div><div class="items" id="m-sold-items"></div></div><div class="card"><div class="card-title"><span>🏷️ メルカリ 出品中<span class="badge badge-o">出品中</span></span><a id="m-sale-link" href="#" target="_blank">見る →</a></div><div class="stats" id="m-sale-stats"></div><div class="items" id="m-sale-items"></div></div><div class="card"><div class="card-title"><span>🔨 ヤフオク 落札済み<span class="badge badge-y">SOLD</span></span><a id="y-link" href="#" target="_blank">見る →</a></div><div class="stats" id="y-stats"></div><div class="chart-wrap"><canvas id="yahooChart"></canvas></div><div class="items" id="y-items"></div></div></div><script>const GAS="https://script.google.com/macros/s/AKfycbxyIoSzAR8N4RXLIzfejat2UpQxQjbntKJCvm2IvwB799Tj1ZHfQitigh-HsXB3Ug63Vg/exec";let soldChart=null,yahooChart=null;document.getElementById("keyword").addEventListener("keydown",e=>{if(e.key==="Enter")search();});function openScanner(){document.getElementById("scanner-wrap").style.display="flex";Quagga.init({inputStream:{type:"LiveStream",target:document.getElementById("interactive"),constraints:{facingMode:"environment"}},decoder:{readers:["ean_reader","ean_8_reader","code_128_reader"]},locate:true},err=>{if(err){alert("カメラエラー");closeScanner();return;}Quagga.start();});Quagga.offDetected();Quagga.onDetected(data=>{const code=data.codeResult.code;if(!code)return;document.getElementById("keyword").value=code;document.getElementById("jan-display").textContent="JANコード: "+code;closeScanner();search();});}function closeScanner(){document.getElementById("scanner-wrap").style.display="none";try{Quagga.stop();}catch(e){}}async function search(){const kw=document.getElementById("keyword").value.trim();if(!kw)return;const enc=encodeURIComponent(kw);document.getElementById("m-sold-link").href="https://jp.mercari.com/search?keyword="+enc+"&status=sold_out";document.getElementById("m-sale-link").href="https://jp.mercari.com/search?keyword="+enc+"&status=on_sale";document.getElementById("y-link").href="https://auctions.yahoo.co.jp/closedsearch/closedsearch?p="+enc;document.getElementById("loading").style.display="block";document.getElementById("results").style.display="none";try{const[mSold,mSale,yahoo]=await Promise.all([fetch(GAS+"?keyword="+enc+"&type=mercari_sold").then(r=>r.json()).catch(()=>({items:[]})),fetch(GAS+"?keyword="+enc+"&type=mercari_sale").then(r=>r.json()).catch(()=>({items:[]})),fetch(GAS+"?keyword="+enc+"&type=yahoo_sold").then(r=>r.json()).catch(()=>({items:[]}))]);document.getElementById("loading").style.display="none";document.getElementById("results").style.display="block";renderMercariSold(mSold.items||[]);renderMercariSale(mSale.items||[]);renderYahoo(yahoo.items||[]);}catch(e){document.getElementById("loading").style.display="none";document.getElementById("results").style.display="block";}}function calcStats(items){const prices=items.map(i=>i.price).filter(p=>p>0).sort((a,b)=>a-b);if(!prices.length)return null;return{avg:Math.round(prices.reduce((s,p)=>s+p,0)/prices.length),med:prices[Math.floor(prices.length/2)],min:prices[0],max:prices[prices.length-1],count:prices.length};}function yen(p){return"¥"+p.toLocaleString();}function fmtDate(ts){if(!ts)return"";const d=new Date(typeof ts==="number"?ts*1000:ts);return isNaN(d)?"":(d.getMonth()+1)+"/"+(d.getDate());}function renderStats(el,s,labels){if(!s){el.innerHTML="<div class=\"empty\" style=\"grid-column:1/-1\">データなし</div>";return;}el.innerHTML=labels.map((l,i)=>{const vals=[yen(s.avg),yen(s.med),s.count+"件",yen(s.min),yen(s.max)];return"<div class=\"stat\"><div class=\"stat-lbl\">"+l+"</div><div class=\"stat-val\">"+vals[i]+"</div></div>";}).join("");}function renderItems(el,items,urlFn){if(!items.length){el.innerHTML="<div class=\"empty\">データなし</div>";return;}el.innerHTML=items.slice(0,20).map(item=>"<a class=\"item\" href=\""+urlFn(item)+"\" target=\"_blank\">"+(item.thumbnail?"<img class=\"thumb\" src=\""+item.thumbnail+"\" loading=\"lazy\" onerror=\"this.style.display='none'\">":"<div class=\"thumb\"></div>")+"<div class=\"item-info\"><div class=\"item-name\">"+(item.name||"商品名不明")+"</div><div class=\"item-price\">"+yen(item.price)+"</div>"+(item.created?"<div class=\"item-sub\">"+fmtDate(item.created)+"</div>":"")+"</div></a>").join("");}function makeChart(id,items,existing){if(existing)existing.destroy();const sorted=[...items].filter(i=>i.price>0).sort((a,b)=>(a.created||0)-(b.created||0)).slice(-20);if(!sorted.length)return null;return new Chart(document.getElementById(id).getContext("2d"),{type:"line",data:{labels:sorted.map(i=>fmtDate(i.created)),datasets:[{data:sorted.map(i=>i.price),borderColor:"#e9594c",backgroundColor:"rgba(233,89,76,0.08)",tension:0.3,pointRadius:3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>"¥"+v.toLocaleString(),font:{size:10}}},x:{ticks:{font:{size:10}}}}}});}function renderMercariSold(items){renderStats(document.getElementById("m-sold-stats"),calcStats(items),["平均","中央値","件数"]);soldChart=makeChart("soldChart",items,soldChart);renderItems(document.getElementById("m-sold-items"),items,i=>"https://jp.mercari.com/item/"+i.id);}function renderMercariSale(items){const s=[...items].sort((a,b)=>a.price-b.price);renderStats(document.getElementById("m-sale-stats"),calcStats(s),["最安","平均","件数"]);renderItems(document.getElementById("m-sale-items"),s,i=>"https://jp.mercari.com/item/"+i.id);}function renderYahoo(items){renderStats(document.getElementById("y-stats"),calcStats(items),["平均","中央値","件数"]);yahooChart=makeChart("yahooChart",items,yahooChart);renderItems(document.getElementById("y-items"),items,i=>i.id?"https://page.auctions.yahoo.co.jp/jp/auction/"+i.id:"#");}</script></body></html>
